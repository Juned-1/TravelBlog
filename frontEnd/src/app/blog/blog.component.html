<app-toolbar [isLoggedIn]="isLoggedIn"></app-toolbar>
<ion-content class="ion-padding-horizontal">
  <div style="overflow: hidden;">
    <quill-view id="content" *ngIf="posts !== undefined" [content]="posts.post_content"></quill-view>
  </div>
  <div>
    <p *ngIf="posts !== undefined">Author : {{posts.firstName + ' ' + posts.lastName}}</p>
    <p *ngIf="posts !== undefined">Date : {{posts.post_time}}</p>
  </div>
</ion-content>
